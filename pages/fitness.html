<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>斯凯的塑形训练打卡 | 由豆包与DeepSeek共同开发</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link href="https://fontsapi.zeoseven.com/3/main/result.css" onload="this.rel='stylesheet'" rel="preload" as="style" crossorigin />
<noscript><link rel="stylesheet" href="https://fontsapi.zeoseven.com/3/main/result.css" /></noscript>
    <style>
        @import url("https://fontsapi.zeoseven.com/3/main/result.css");
        
        /* ========== 全局 CSS 变量（统一风格，方便修改） ========== */
        :root {
            /* 主色调 */
            --color-primary: #58cc71;
            --color-primary-dark: #3b9e4e;
            --color-accent: #ffb441;
            --color-accent-dark: #e67e22;
            --color-bg-light: #fef9ef;
            --color-border-light: #ffe0b5;
            --color-border-medium: #e0e0e0;
            --color-shadow: #c0d6c0;
            
            /* 圆角统一 */
            --radius-card: 20px;
            --radius-inner: 14px;
            --radius-small: 30px;
            
            /* 边框宽度 */
            --border-width: 2px;
            --border-width-thick: 3px;
            
            /* 阴影偏移量（纯色阴影） */
            --shadow-offset-x: 5px;
            --shadow-offset-y: 5px;
            --shadow-blur: 0px;
            
            /* 过渡 */
            --transition: 0.05s ease-in-out;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            tap-highlight-color: transparent;
        }
        body {
            font-family: "寒蝉全圆体", "Comic Neue", "Segoe UI Emoji", cursive, sans-serif;
            font-weight: normal;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        /* 最外层容器：无边框 */
        .app-container {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            border-radius: 0;
            border: none;
            overflow: hidden;
            transition: all 0.2s;
            position: relative;
            z-index: 10;
        }
        /* header 调整：背景色保留，内部元素无额外边距，背景白色 */
        .header {
            background: var(--color-primary);
            padding: 18px 22px 12px 22px;
            border-bottom: var(--border-width) solid var(--color-primary-dark);
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: white;
            text-shadow: none;
            margin-bottom: 12px;
            text-align: left;
        }
        /* header 内部元区域：无额外边距，内部元素白色背景 */
        .header-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            margin: 0;
            padding: 0;
        }
        /* 曲线徽章外层无样式，内部span保持样式 */
        .curve-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: transparent;
            padding: 0;
            margin: 0;
            border-radius: 0;
            border: none;
        }
        .curve-badge span {
            background: #ffffff;  /* 白色背景 */
            padding: 4px 14px;
            border-radius: var(--radius-small);
            font-weight: bold;
            font-size: 0.8rem;
            color: #2c6e3c;
            border: none;
        }
        .curve-badge span i {
            margin-right: 4px;
        }
        .duration-badge {
            background: #ffffff;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 18px;
            border-radius: var(--radius-small);
            font-size: 0.8rem;
            color: #2c6e3c;
            border: none;
        }
        /* 日历卡片 */
        .calendar-card {
            background: var(--color-bg-light);
            margin: 12px 18px 8px;
            border-radius: var(--radius-card);
            padding: 12px 12px 16px;
            border: var(--border-width) solid var(--color-border-light);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 12px;
            font-weight: bold;
            color: var(--color-primary);
        }
        .calendar-header button {
            background: #f0f4f0;
            border: none;
            border-radius: var(--radius-small);
            padding: 6px 14px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            color: #2c6e3c;
            border: var(--border-width) solid var(--color-shadow);
            transition: var(--transition);
            /* 换页按钮加阴影 */
            box-shadow: calc(var(--shadow-offset-x)/1.5) calc(var(--shadow-offset-y)/1.5) var(--shadow-blur) var(--color-shadow);
        }
        .calendar-header button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--color-shadow);
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin: 12px 0 6px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #8c8c8c;
        }
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }
        .day-cell {
            background: #fff2e2;
            border-radius: var(--radius-inner);
            padding: 8px 0;
            font-size: 0.85rem;
            font-weight: bold;
            color: #9b5a2a;
            transition: 0.1s;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border: 1px solid var(--color-border-light);
        }
        .day-cell.checked {
            background: #d9e8bd;
            color: #3e6b0c;
            border-color: #88bc3c;
        }
        .day-cell.checked i {
            font-size: 0.7rem;
        }
        .day-cell.today {
            border: 2px solid var(--color-accent);
            background: #ffefcf;
        }
        .day-cell.other-month {
            opacity: 0.4;
        }
        .day-cell.future {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .calendar-legend {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 12px;
            color: #b9834e;
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        /* 进度条区域 */
        .progress-area {
            padding: 10px 24px 8px;
            background: #ffffff;
        }
        .progress-bar-bg {
            background: #e8f0e8;
            border-radius: 30px;
            height: 16px;
            border: var(--border-width) solid var(--color-shadow);
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--color-primary);
            background: linear-gradient(90deg, #6fcf97, #2ecc71);
            border-radius: 30px;
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-weight: bold;
            color: #3c8c4a;
            font-size: 0.85rem;
        }
        /* 动作卡片 */
        .action-card {
            background: #ffffff;
            margin: 16px 18px;
            border-radius: var(--radius-card);
            padding: 20px 18px;
            border: var(--border-width) solid var(--color-border-medium);
            transition: 0.1s;
        }
        @keyframes cardFlash {
            0% { background: #ffffff; }
            50% { background: #fef9e6; }
            100% { background: #ffffff; }
        }
        .card-flash {
            animation: cardFlash 0.4s ease;
        }
        .action-name {
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            margin-bottom: 8px;
			justify-content: space-between;
        }
        .type-label { 
            background: #fff0db; 
            border-radius: var(--radius-small); 
            padding: 4px 8px; 
            font-size: 0.7rem; 
            font-weight: bold; 
            color: var(--color-accent-dark); 
            margin-left: 8px; 
            border: 1px solid var(--color-border-light);
        }
        .spec-badge { 
            background: #f9f9f9; 
            border-radius: var(--radius-inner); 
            padding: 6px 16px; 
            display: inline-block; 
            margin: 8px 0; 
            font-weight: bold; 
            color: var(--color-accent-dark); 
            font-size: 0.9rem; 
            border-left: 5px solid var(--color-accent); 
            border: 1px solid var(--color-border-medium);
        }
        
        /* 三个区域 */
        .tips-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 12px 0;
        }
        .tip-item {
            background: var(--color-bg-light);
            border-radius: var(--radius-inner);
            padding: 12px 8px;
            border: var(--border-width) solid var(--color-border-light);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }
        .tip-icon {
            font-size: 1.3rem;
            color: var(--color-accent);
        }
        .tip-title {
            font-weight: bold;
            color: var(--color-accent-dark);
            font-size: 0.9rem;
        }
        .tip-text {
            color: #7c471f;
            font-size: 0.8rem;
            line-height: 1.3;
            text-align: left;
            word-break: break-word;
        }
        
        .group-status { display: flex; gap: 20px; margin: 16px 0 12px; justify-content: center; }
        .group-chip { 
            background: #f0f4f0; 
            border-radius: var(--radius-small); 
            padding: 6px 18px; 
            font-weight: bold; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            border: var(--border-width) solid var(--color-shadow); 
            color: #2c6e3c; 
        }
        .group-chip.completed { 
            background: #d9e8bd; 
            border-color: #88bc3c; 
            color: #3e6b0c; 
            text-decoration: line-through; 
        }
        
        /* 按钮样式（纯色阴影） */
        @keyframes btnPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); background: #6fd989; }
            100% { transform: scale(1); }
        }
        .btn-complete {
            background: var(--color-primary);
            border: none;
            width: 100%;
            padding: 16px 0;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: inherit;
            color: white;
            border-radius: var(--radius-small);
            margin-top: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: var(--border-width) solid var(--color-primary-dark);
            box-shadow: var(--shadow-offset-x) var(--shadow-offset-y) var(--shadow-blur) var(--color-primary-dark);
        }
        .btn-complete:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--color-primary-dark);
        }
        .btn-complete.disabled {
            opacity: 0.55;
            pointer-events: none;
            filter: grayscale(0.05);
            box-shadow: none;
        }
        .pulse-animation {
            animation: btnPulse 0.3s ease-out;
        }
        
        .reset-btn {
            background: #f0f4f0;
            margin: 0 18px 24px 18px;
            width: calc(100% - 36px);
            padding: 12px;
            border-radius: var(--radius-small);
            border: none;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            color: #2c6e3c;
            border: var(--border-width) solid var(--color-shadow);
            box-shadow: var(--shadow-offset-x) var(--shadow-offset-y) var(--shadow-blur) var(--color-shadow);
        }
        .reset-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--color-shadow);
        }
        .skip-rest {
            background: #ffe0b5;
            border: none;
            padding: 5px 18px;
            border-radius: var(--radius-small);
            font-weight: bold;
            color: #a5511f;
            cursor: pointer;
            margin-left: 12px;
            border: var(--border-width) solid #c57a42;
            box-shadow: 3px 3px 0 #c57a42;
        }
        .skip-rest:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #c57a42;
        }
        .aux-btn {
            background: var(--color-accent);
            border: none;
            border-radius: var(--radius-small);
            padding: 4px 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            border: var(--border-width) solid var(--color-accent-dark);
            box-shadow: 3px 3px 0 #cc8822;
        }
        .aux-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #cc8822;
        }
        .modal-buttons button {
            background: #f0f4f0;
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius-small);
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            color: #2c6e3c;
            border: var(--border-width) solid var(--color-shadow);
            box-shadow: 3px 3px 0 var(--color-shadow);
        }
        .modal-buttons button:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--color-shadow);
        }
        
        /* 数据导入导出按钮组 */
        .data-actions {
            display: flex;
            gap: 12px;
            margin: 8px 18px 12px;
        }
        .data-btn {
            flex: 1;
            background: #f0f4f0;
            border: var(--border-width) solid var(--color-shadow);
            border-radius: var(--radius-small);
            padding: 10px 0;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            color: #2c6e3c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
            box-shadow: var(--shadow-offset-x) var(--shadow-offset-y) var(--shadow-blur) var(--color-shadow);
        }
        .data-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--color-shadow);
        }
        
        /* 其他 */
        .float-text {
            position: fixed;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--color-accent);
            text-shadow: none;
            background: rgba(255,255,255,0.9);
            padding: 4px 12px;
            border-radius: var(--radius-small);
            pointer-events: none;
            z-index: 2000;
            animation: floatUp 1s ease-out forwards;
            border: var(--border-width) solid var(--color-accent);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            70% { opacity: 0.8; transform: translateY(-50px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-box {
            background: #ffffff;
            border-radius: var(--radius-card);
            max-width: 280px;
            width: 80%;
            padding: 24px 20px;
            text-align: center;
            border: var(--border-width-thick) solid var(--color-accent);
            font-family: inherit;
        }
        .modal-box p {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--color-primary);
            margin: 16px 0;
            padding: 0 8px;
        }
        .rest-panel { 
            background: var(--color-bg-light); 
            margin: 8px 18px 20px; 
            border-radius: var(--radius-card); 
            padding: 12px; 
            text-align: center; 
            border: var(--border-width) solid var(--color-border-light); 
        }
        .rest-timer { 
            font-size: 2.3rem; 
            font-weight: 800; 
            font-family: monospace; 
            background: #ffffff; 
            display: inline-block; 
            padding: 6px 24px; 
            border-radius: var(--radius-small); 
            margin: 6px 0; 
            color: var(--color-accent-dark); 
            border: var(--border-width) solid var(--color-border-light);
        }
        .finish-celebrate { 
            text-align: center; 
            padding: 18px; 
            background: var(--color-bg-light); 
            border-radius: var(--radius-card); 
            margin: 12px 18px 20px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: var(--color-accent-dark); 
            border: var(--border-width) solid var(--color-border-light);
        }
        footer { 
            text-align: center; 
            font-size: 0.7rem; 
            padding: 14px; 
            color: #8c8c8c; 
        }
        .aux-timer { 
            background: #f9f9f9; 
            border-radius: calc(var(--radius-small)/1.5); 
            padding: 12px; 
            margin: 10px 0 6px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            flex-wrap: wrap; 
            gap: 8px; 
            border: var(--border-width) solid var(--color-border-medium);
        }
        .aux-timer-display { 
            background: #e8f5e9; 
            padding: 4px 14px; 
            border-radius: calc(var(--radius-small)/2); 
            font-weight: bold; 
            border: var(--border-width) solid var(--color-shadow);
        }
        .flash-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,200,0.6) 0%, rgba(255,200,100,0) 80%);
            pointer-events: none;
            z-index: 1500;
            animation: flashFade 0.5s ease-out forwards;
        }
        @keyframes flashFade {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="app-container">
    <div class="header">
        <h1>斯凯的塑形训练打卡</h1>
        <div class="header-meta">
            <div class="curve-badge">
                <span><i class="fas fa-fire"></i> 热身激活</span>
                <span><i class="fas fa-bolt"></i> 核心稳定</span>
                <span><i class="fas fa-dumbbell"></i> 下腹强化</span>
                <span><i class="fas fa-leaf"></i> 静力收尾</span>
            </div>
            <div class="duration-badge">
                <i class="fas fa-hourglass-start"></i> 约10分钟 · 徒手塑形 · 零基础
            </div>
        </div>
    </div>
    <div class="calendar-card" id="calendarCard">
        <div class="calendar-header">
            <button id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
            <span id="monthYearDisplay" style="font-size:1.2rem; font-weight:800;">2025年4月</span>
            <button id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="weekdays"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
        <div class="calendar-days" id="calendarDays"></div>
        <div class="calendar-legend"><span><i class="fas fa-check-circle" style="color:#6f9e2f;"></i> 已打卡</span><span><i class="far fa-circle" style="color:#ffb441;"></i> 未打卡</span><span><i class="fas fa-hand-sparkles"></i> 点击日期补打卡</span></div>
    </div>
    <div class="progress-area">
        <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
        <div class="stats-row"><span><i class="fas fa-dumbbell"></i> 今日曲线挑战</span><span id="progressText">0 / 8 组完成</span></div>
    </div>
    <div id="dynamicZone"></div>
    
    <!-- 数据导入导出按钮组 -->
    <div class="data-actions">
        <button class="data-btn" id="exportDataBtn"><i class="fas fa-download"></i> 导出打卡数据</button>
        <button class="data-btn" id="importDataBtn"><i class="fas fa-upload"></i> 导入打卡数据</button>
    </div>
    <input type="file" id="importFileInput" accept=".json" style="display: none;">
    
    <button class="reset-btn" id="resetBtn"><i class="fas fa-undo-alt"></i> 重新开始训练</button>
    <footer>
        <i class="fas fa-code-branch"></i> 由豆包与DeepSeek共同开发
    </footer>
</div>
<script>
    // ========== 全局按钮音效 ==========
    let audioCtx = null;
    let soundEnabled = true;
    function initAudio() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { soundEnabled = false; }
    }
    function playButtonClick() {
        if (!soundEnabled) return;
        if (!audioCtx) initAudio();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
        osc.start();
        osc.stop(now + 0.15);
    }
    function attachClickSoundToButtons() {
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            if (btn.getAttribute('data-sound-attached')) return;
            btn.setAttribute('data-sound-attached', 'true');
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                playButtonClick();
            });
        });
    }
    function bindAllButtonsSound() {
        setTimeout(() => attachClickSoundToButtons(), 10);
    }
    
    // ========== 打卡记录模块 ==========

    function renderCalendar(year, month) {

        const container = document.getElementById('calendarDays'); if (!container) return;
        container.innerHTML = '';
        const todayStr = getTodayStr();
        const todayDate = new Date();
        todayDate.setHours(0,0,0,0);
        
        function isFutureDate(y, m, d) {
            const target = new Date(y, m, d);
            target.setHours(0,0,0,0);
            return target > todayDate;
        }
        
        for (let i = 0; i < startOffset; i++) {
            const prevDateNum = prevMonthDays - startOffset + i + 1;
            const prevYear = month === 0 ? year - 1 : year;
            const prevMonthIndex = month === 0 ? 11 : month - 1;
            const dateStr = `${prevYear}-${String(prevMonthIndex+1).padStart(2,'0')}-${String(prevDateNum).padStart(2,'0')}`;

            const div = document.createElement('div');
            div.className = `day-cell other-month ${isChecked ? 'checked' : ''} ${isFuture ? 'future' : ''}`;
            div.innerHTML = `<div>${prevDateNum}</div>${isChecked ? '<div><i class="fas fa-check-circle"></i></div>' : ''}`;

            }

        }

            const isChecked = checkInMap.get(dateStr) === true;
            const isToday = (dateStr === todayStr);
            const isFuture = isFutureDate(year, month, d);

            }
            container.appendChild(div);
        }
        const totalCells = 42; const currentCells = startOffset + daysInMonth; const remaining = totalCells - currentCells;
        for (let i = 1; i <= remaining; i++) {
            const nextYear = month === 11 ? year + 1 : year;
            const nextMonthIndex = month === 11 ? 0 : month + 1;
            const dateStr = `${nextYear}-${String(nextMonthIndex+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

                    e.stopPropagation();
                    showConfirmModal(`补打卡 ${nextYear}年${nextMonthIndex+1}月${i}日？`, () => markCheckInForDate(dateStr, true));
                });
            } else if (isFuture) {
                div.title = "不能补打卡未来日期";
            }
            container.appendChild(div);
        }

        document.getElementById('monthYearDisplay').innerText = `${year}年 ${monthNames[month]}`;
        bindAllButtonsSound();

                </div>
                <div class="tip-item">
                    <div class="tip-icon"><i class="fas fa-fire"></i></div>
                    <div class="tip-title">正确感受</div>
                    <div class="tip-text">${action.correctFeeling}</div>
                </div>
                <div class="tip-item">
                    <div class="tip-icon"><i class="fas fa-shield-alt"></i></div>
                    <div class="tip-title">注意</div>
                    <div class="tip-text">${action.wrongTip}</div>
                </div>
            </div>
        `;
        
        const disableComplete=(isResting||!trainingActive||(isGroup2Done&&currentGroupCompleted===2)); const btnText=(isGroup2Done&&currentGroupCompleted===2)?'<i class="fas fa-check-double"></i> 已完成两组':'<i class="fas fa-clipboard-list"></i> 打卡 · 完成这组';
        const html=`<div class="action-card"><div class="action-name"><div><i class="fas ${action.name==='臀桥'?'fa-bridge':action.name==='平板支撑'?'fa-hand-peace':action.name==='仰卧抬腿'?'fa-person-walking':'fa-building'}"></i>${action.name}</div><span class="type-label">${action.intensity}</span></div><div class="spec-badge"><i class="fas fa-bullseye"></i> 目标：${action.targetDesc}</div>${tipsHtml}${groupChips}${auxHtml}<button class="btn-complete ${disableComplete?'disabled':''}" id="completeGroupBtn">${btnText}</button></div>${restPanelHtml}`;
        dynamicZone.innerHTML=html;
        const completeBtn=document.getElementById('completeGroupBtn'); if(completeBtn&&!disableComplete) completeBtn.addEventListener('click',()=>{ if(!audioCtx) initAudio(); if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume(); completeCurrentGroup(); });
        const skipBtn=document.getElementById('skipRestBtn'); if(skipBtn) skipBtn.addEventListener('click',()=>{ if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume(); skipRest(); });
        const auxStart=document.getElementById('auxStartBtn'), auxStop=document.getElementById('auxStopBtn');
        if(auxStart&&showAux) auxStart.addEventListener('click',()=>{ if(!audioCtx) initAudio(); if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume(); stopAuxTimer(); startAuxTimer(defaultSec,()=>playBeep('restEnd')); });
        if(auxStop&&showAux) auxStop.addEventListener('click',()=>stopAuxTimer());
        bindAllButtonsSound();
    }
    function unlockAudio(){ if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume(); }
    document.body.addEventListener('touchstart', unlockAudio, { once: true });
    document.body.addEventListener('click', unlockAudio);
    
    // 初始化与事件绑定
    loadCheckIns(); renderCalendar(currentYear, currentMonth);
    document.getElementById('prevMonthBtn')?.addEventListener('click', prevMonth);
    document.getElementById('nextMonthBtn')?.addEventListener('click', nextMonth);
    resetBtnDom.removeEventListener('click', resetWithConfirm);
    resetBtnDom.addEventListener('click', () => { if(!audioCtx) initAudio(); if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume(); resetWithConfirm(); });
    
    // 导入导出事件
    const exportBtn = document.getElementById('exportDataBtn');
    const importBtn = document.getElementById('importDataBtn');
    const fileInput = document.getElementById('importFileInput');
    exportBtn.addEventListener('click', () => exportData());
    importBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            importData(e.target.files[0]);
            fileInput.value = '';
        }
    });
    
    (function init() { trainingActive=true; currentActionIdx=0; currentGroupCompleted=0; completedGroupsCount=0; updateProgressBar(); renderCurrentView(); resizeCanvas(); bindAllButtonsSound(); })();
</script>
</body>
</html>
